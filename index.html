<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Daily - 香港科技日報</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0f;
            color: #e6edf3;
            min-height: 100vh;
        }

        /* Top Navigation */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 0 20px;
        }
        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        .nav-logo {
            font-size: 1.2em;
            font-weight: 700;
            background: linear-gradient(135deg, #6ee7b7, #3b82f6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .nav-tabs {
            display: flex;
            gap: 4px;
        }
        .nav-tab {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 500;
            color: #8b949e;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            white-space: nowrap;
        }
        .nav-tab:hover { color: #e6edf3; background: rgba(255,255,255,0.06); }
        .nav-tab.active {
            color: #fff;
            background: rgba(99, 102, 241, 0.2);
        }
        .nav-tab .tab-icon { margin-right: 4px; }

        /* Header */
        header {
            text-align: center;
            padding: 48px 20px 24px;
        }
        header h1 {
            font-size: 2.4em;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #6ee7b7, #3b82f6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header p {
            color: #6b7280;
            margin-top: 8px;
            font-size: 1.05em;
        }

        /* Calendar Navigation */
        .calendar-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
        }
        .calendar-nav button {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #e6edf3;
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .calendar-nav button:hover { background: rgba(255,255,255,0.08); }
        .calendar-nav span { font-size: 1.15em; font-weight: 600; }

        /* Calendar Grid */
        .calendar {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }
        .weekday-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 6px;
        }
        .weekday-header div {
            text-align: center;
            color: #6b7280;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 0;
        }
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .day-cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.05em;
            color: #4b5563;
            position: relative;
            transition: all 0.25s;
        }
        .day-cell.empty { background: transparent; border: none; }
        .day-cell.has-post {
            background: rgba(59, 130, 246, 0.08);
            border-color: rgba(59, 130, 246, 0.25);
            color: #60a5fa;
            cursor: pointer;
            font-weight: 700;
        }
        .day-cell.has-post:hover {
            background: rgba(59, 130, 246, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.15);
        }
        .day-cell.has-post .dot {
            width: 5px; height: 5px;
            background: #60a5fa;
            border-radius: 50%;
            position: absolute;
            bottom: 8px;
        }
        .day-cell.today {
            border-color: rgba(167, 139, 250, 0.4);
            box-shadow: 0 0 12px rgba(167, 139, 250, 0.15);
        }

        /* Post Viewer */
        .post-viewer {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .post-viewer.active { display: block; }
        .post-viewer .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #60a5fa;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 24px;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .post-viewer .back-btn:hover { background: rgba(255,255,255,0.08); }
        .post-content {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 36px;
            line-height: 1.85;
        }
        .post-content h1 {
            font-size: 1.6em;
            font-weight: 700;
            background: linear-gradient(135deg, #6ee7b7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }
        .post-content h2 {
            font-size: 1.15em;
            color: #a78bfa;
            margin: 28px 0 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(167, 139, 250, 0.15);
            font-weight: 600;
        }
        .post-content h3 {
            font-size: 1em;
            color: #e6edf3;
            margin: 18px 0 6px;
            font-weight: 600;
        }
        .post-content p { margin: 6px 0; color: #d1d5db; }
        .post-content a {
            color: #60a5fa;
            text-decoration: none;
            border-bottom: 1px solid rgba(96, 165, 250, 0.3);
            transition: border-color 0.2s;
        }
        .post-content a:hover { border-bottom-color: #60a5fa; }
        .post-content strong { color: #f3f4f6; }

        /* Section filter in post */
        .section-youtube h3 { display: block; }
        .section-lihkg h3 { display: block; }
        .section-agent h3 { display: block; }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #374151;
            font-size: 0.85em;
        }
        footer a { color: #4b5563; text-decoration: none; }
        footer a:hover { color: #6b7280; }

        /* Responsive */
        @media (max-width: 640px) {
            .nav-inner { flex-direction: column; height: auto; padding: 10px 0; gap: 6px; }
            .nav-tabs { overflow-x: auto; width: 100%; justify-content: center; }
            .nav-tab { padding: 6px 12px; font-size: 0.8em; }
            header h1 { font-size: 1.8em; }
            .day-cell { font-size: 0.85em; border-radius: 8px; }
            .post-content { padding: 20px; border-radius: 12px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <div class="nav-logo">🤖 Tech Daily</div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-filter="all">
                    <span class="tab-icon">📋</span>全部
                </button>
                <button class="nav-tab" data-filter="youtube">
                    <span class="tab-icon">📺</span>YouTube
                </button>
                <button class="nav-tab" data-filter="lihkg">
                    <span class="tab-icon">💬</span>討論區
                </button>
                <button class="nav-tab" data-filter="agent">
                    <span class="tab-icon">🤖</span>AI Agent
                </button>
            </div>
        </div>
    </nav>

    <header>
        <h1>Tech Daily</h1>
        <p>每日香港科技新聞 ✦ YouTube ✦ 討論區 ✦ AI Agent</p>
    </header>

    <div id="calendarView">
        <div class="calendar-nav">
            <button onclick="changeMonth(-1)">◀ 上月</button>
            <span id="monthLabel"></span>
            <button onclick="changeMonth(1)">下月 ▶</button>
        </div>
        <div class="calendar">
            <div class="weekday-header">
                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
            </div>
            <div class="days-grid" id="daysGrid"></div>
        </div>
    </div>

    <div class="post-viewer" id="postViewer">
        <button class="back-btn" onclick="showCalendar()">← 返回日曆</button>
        <div class="post-content" id="postContent"></div>
    </div>

    <footer>
        Powered by <a href="https://github.com/openclaw/openclaw">OpenClaw</a> 🦞 ✦ Built by v2sdryan
    </footer>

    <script>
        let currentDate = new Date();
        let postIndex = {};
        let currentFilter = 'all';

        // Tab filtering
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                applyFilter();
            });
        });

        function applyFilter() {
            const content = document.getElementById('postContent');
            if (!content.innerHTML) return;

            const sections = content.querySelectorAll('h2');
            sections.forEach(section => {
                let el = section;
                const sectionText = section.textContent.toLowerCase();
                let sectionType = 'other';
                if (sectionText.includes('youtube')) sectionType = 'youtube';
                else if (sectionText.includes('連登') || sectionText.includes('討論區')) sectionType = 'lihkg';
                else if (sectionText.includes('ai agent')) sectionType = 'agent';

                const show = currentFilter === 'all' || currentFilter === sectionType;
                section.style.display = show ? '' : 'none';

                // Toggle all elements until next h2
                el = section.nextElementSibling;
                while (el && el.tagName !== 'H2') {
                    el.style.display = show ? '' : 'none';
                    el = el.nextElementSibling;
                }
            });
        }

        async function loadIndex() {
            try {
                const res = await fetch('posts/index.json');
                if (res.ok) postIndex = await res.json();
            } catch(e) {}
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const today = new Date();

            document.getElementById('monthLabel').textContent =
                `${year} 年 ${month + 1} 月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('daysGrid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += '<div class="day-cell empty"></div>';
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasPost = postIndex[dateStr];
                const isToday = today.getFullYear() === year &&
                                today.getMonth() === month &&
                                today.getDate() === d;

                const cell = document.createElement('div');
                const classes = ['day-cell'];
                if (hasPost) classes.push('has-post');
                if (isToday) classes.push('today');
                cell.className = classes.join(' ');
                cell.innerHTML = d + (hasPost ? '<div class="dot"></div>' : '');
                if (hasPost) cell.onclick = () => loadPost(dateStr);
                grid.appendChild(cell);
            }
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        async function loadPost(dateStr) {
            try {
                const res = await fetch(`posts/${dateStr}.html`);
                if (res.ok) {
                    document.getElementById('postContent').innerHTML = await res.text();
                    document.getElementById('calendarView').style.display = 'none';
                    document.getElementById('postViewer').classList.add('active');
                    currentFilter = 'all';
                    document.querySelectorAll('.nav-tab').forEach(t => {
                        t.classList.toggle('active', t.dataset.filter === 'all');
                    });
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            } catch(e) {
                alert('載入失敗');
            }
        }

        function showCalendar() {
            document.getElementById('calendarView').style.display = 'block';
            document.getElementById('postViewer').classList.remove('active');
        }

        loadIndex();
    </script>
</body>
</html>
